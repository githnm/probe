name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: probe
          POSTGRES_PASSWORD: probe
          POSTGRES_DB: probe_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U probe"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    env:
      PROBE_PG_URL: "postgresql://probe:probe@localhost:5432/probe_test"

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint with ruff
        run: ruff check .

      - name: Run tests
        run: pytest -v
