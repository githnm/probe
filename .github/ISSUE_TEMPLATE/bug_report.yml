name: Bug report
description: Report a bug in Probe.
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: Describe the bug. Include the probe command you ran and the output.
      placeholder: "probe diff --old ... --new ... produced incorrect results"
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: Minimal SQL or seed case that reproduces the bug.
      render: sql
  - type: input
    id: version
    attributes:
      label: Probe version
      description: Output of `probe --version`.
  - type: dropdown
    id: adapter
    attributes:
      label: Database adapter
      options:
        - DuckDB
        - Postgres
        - Other
